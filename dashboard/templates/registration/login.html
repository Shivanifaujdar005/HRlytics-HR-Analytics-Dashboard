<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HRlytics Login</title>
    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-container {
            background: #fff;
            padding: 2rem 2.5rem;
            border-radius: 8px;
            box-shadow: 0 6px 24px rgba(32, 56, 108, 0.15);
            width: 320px;
            text-align: center;
        }

        .login-container h2 {
            margin-bottom: 1.5rem;
            color: #23408e;
        }

        .login-container form {
            display: flex;
            flex-direction: column;
        }

        .login-container input[type="text"],
        .login-container input[type="password"] {
            padding: 0.6rem 0.75rem;
            margin-bottom: 1rem;
            border: 1px solid #d5dbdb;
            border-radius: 4px;
            background: #f5f7fa;
            font-size: 1rem;
        }

        .login-container button {
            padding: 0.6rem 0.75rem;
            background: #23408e;
            color: #fff;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-container button:hover {
            background: #10234f;
        }

        .errorlist {
            color: #d32f2f;
            list-style: none;
            padding: 0;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
<div class="login-container">
    <h2>HRlytics Login</h2>
    {% if form.errors %}
        <ul class="errorlist">
            {% for field in form %}
                {% for error in field.errors %}
                    <li>{{ error }}</li>
                {% endfor %}
            {% endfor %}
        </ul>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.username.label_tag }}
        {{ form.username }}
        {{ form.password.label_tag }}
        {{ form.password }}
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
